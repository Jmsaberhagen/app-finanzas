<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centro de Control — Acceso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --bg: #0a0a0a;
    --surface: #161616;
    --surface-hover: #1d1d1d;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.14);
    --green: #107C10;
    --green-bright: #3CC93C;
    --green-glow: rgba(60, 201, 60, 0.35);
    --red: #E5484D;
    --red-glow: rgba(229, 72, 77, 0.3);
    --text-primary: #F2F2F2;
    --text-secondary: #8C8C8C;
    --text-tertiary: #5C5C5C;
    --font-display: 'Chakra Petch', sans-serif;
    --font-body: 'Inter', sans-serif;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  body{
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 10%, rgba(16,124,16,0.12) 0%, transparent 45%),
      radial-gradient(circle at 85% 85%, rgba(16,124,16,0.08) 0%, transparent 40%);
    color: var(--text-primary);
    font-family: var(--font-body);
    min-height: 100vh;
    display:flex; align-items:center; justify-content:center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }

  .auth-card{
    width: 100%;
    max-width: 420px;
    background: linear-gradient(155deg, var(--surface) 0%, #0e0e0e 100%);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 38px 36px 32px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.7);
  }
  .auth-card::before{
    content:''; position:absolute; inset:0; border-radius:18px;
    background: linear-gradient(125deg, rgba(60,201,60,0.08), transparent 55%);
    pointer-events:none;
  }

  .brand{ display:flex; align-items:center; gap:14px; margin-bottom: 30px; }
  .brand-icon{
    width:44px; height:44px; border-radius:11px;
    background: linear-gradient(145deg, var(--green-bright), var(--green));
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 0 22px var(--green-glow);
    font-family: var(--font-display); font-weight:700; font-size:19px; color:#031a03;
  }
  .brand-text h1{ font-family: var(--font-display); font-weight:600; font-size:18px; letter-spacing:0.5px; }
  .brand-text span{ font-size:11px; color: var(--text-secondary); letter-spacing:1px; text-transform:uppercase; }

  .mode-toggle{
    display:flex; background: rgba(255,255,255,0.04); border-radius:10px; padding:4px;
    margin-bottom: 26px; border:1px solid var(--border);
  }
  .mode-btn{
    flex:1; text-align:center; padding:9px 0; border-radius:7px;
    font-family: var(--font-display); font-size:13px; font-weight:600;
    letter-spacing:0.4px; text-transform:uppercase; color: var(--text-secondary);
    cursor:pointer; transition: all .2s ease; border:none; background:transparent;
  }
  .mode-btn.active{ background: var(--green); color:#fff; box-shadow: 0 0 14px var(--green-glow); }

  .field{ margin-bottom: 18px; }
  .field label{
    display:block; font-size:12px; font-weight:600; letter-spacing:0.5px;
    text-transform:uppercase; color: var(--text-secondary); margin-bottom:8px;
  }
  .field input{
    width:100%; background: rgba(255,255,255,0.03); border:1px solid var(--border);
    border-radius:10px; padding:13px 14px; color: var(--text-primary);
    font-family: var(--font-body); font-size:14px; outline:none;
    transition: border-color .2s ease, box-shadow .2s ease;
  }
  .field input::placeholder{ color: var(--text-tertiary); }
  .field input:focus{ border-color: var(--green-bright); box-shadow: 0 0 0 3px var(--green-glow); }

  .field-name{ display:none; }
  .field-name.show{ display:block; }

  .submit-btn{
    width:100%; margin-top: 6px;
    background: linear-gradient(150deg, var(--green-bright), var(--green));
    border:none; border-radius:10px; padding:14px 0;
    font-family: var(--font-display); font-weight:700; font-size:14px;
    letter-spacing:1px; text-transform:uppercase; color:#04140c;
    cursor:pointer; transition: transform .15s ease, box-shadow .15s ease;
    box-shadow: 0 8px 22px -6px rgba(0,0,0,0.5), 0 0 18px var(--green-glow);
    display:flex; align-items:center; justify-content:center; gap:10px;
  }
  .submit-btn:hover{ transform: translateY(-2px); }
  .submit-btn:active{ transform: translateY(0) scale(0.98); }
  .submit-btn:disabled{ opacity:0.6; cursor:not-allowed; transform:none; }

  .spinner{
    width:14px; height:14px; border-radius:50%;
    border:2px solid rgba(4,20,12,0.3); border-top-color:#04140c;
    animation: spin 0.7s linear infinite; display:none;
  }
  .submit-btn.loading .spinner{ display:inline-block; }
  .submit-btn.loading .btn-label{ display:none; }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  .alert{
    margin-top: 16px; padding: 11px 14px; border-radius: 9px;
    font-size: 13px; display:none; align-items:flex-start; gap:8px;
    border:1px solid transparent;
  }
  .alert.show{ display:flex; }
  .alert.error{ background: rgba(229,72,77,0.1); border-color: rgba(229,72,77,0.3); color:#ff9b9e; }
  .alert.success{ background: rgba(60,201,60,0.1); border-color: rgba(60,201,60,0.3); color: var(--green-bright); }

  .divider{ display:flex; align-items:center; gap:12px; margin: 22px 0 4px; }
  .divider::before, .divider::after{ content:''; flex:1; height:1px; background: var(--border); }
  .divider span{ font-size:11px; color: var(--text-tertiary); letter-spacing:0.5px; text-transform:uppercase; }

  .foot-note{ text-align:center; font-size:12px; color: var(--text-tertiary); margin-top:18px; line-height:1.6; }
  .foot-note b{ color: var(--text-secondary); }
</style>
</head>
<body>

<div class="auth-card">
  <div class="brand">
    <div class="brand-icon">$</div>
    <div class="brand-text">
      <h1>Centro de Control</h1>
      <span>Finanzas personales</span>
    </div>
  </div>

  <div class="mode-toggle">
    <button class="mode-btn active" id="tab-login" onclick="setMode('login')">Ingresar</button>
    <button class="mode-btn" id="tab-signup" onclick="setMode('signup')">Crear cuenta</button>
  </div>

  <form id="auth-form" onsubmit="return handleSubmit(event)">
    <div class="field field-name" id="field-name">
      <label>Nombre</label>
      <input type="text" id="full_name" placeholder="¿Cómo te llamás?" autocomplete="name">
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="tu@email.com" autocomplete="email" required>
    </div>

    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="Mínimo 6 caracteres" autocomplete="current-password" required minlength="6">
    </div>

    <button type="submit" class="submit-btn" id="submit-btn">
      <span class="spinner"></span>
      <span class="btn-label" id="btn-label">Ingresar</span>
    </button>

    <div class="alert" id="alert-box"></div>
  </form>

  <div class="divider"><span>Datos privados por usuario</span></div>
  <p class="foot-note">Cada cuenta ve solo <b>sus propios</b> ingresos y gastos.<br>Nadie más puede acceder a tu información.</p>
</div>

<script>
  // ====== CONFIGURACIÓN SUPABASE — proyecto: ariel-finanzas ======
  // Reemplazar estos dos valores con los de tu proyecto:
  // Project Settings → API → Project URL / anon public key
  const SUPABASE_URL = 'https://zbrkadgpdnzxkiiajuyh.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpicmthZGdwZG56eGtpaWFqdXloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNzIwMzUsImV4cCI6MjA5NzY0ODAzNX0.HNwj9zT9OXVKnmZxZixVMiY9xIcUR5BX7Ek-Knh_-D8';

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let mode = 'login';

  function setMode(newMode){
    mode = newMode;
    document.getElementById('tab-login').classList.toggle('active', mode === 'login');
    document.getElementById('tab-signup').classList.toggle('active', mode === 'signup');
    document.getElementById('field-name').classList.toggle('show', mode === 'signup');
    document.getElementById('btn-label').textContent = mode === 'login' ? 'Ingresar' : 'Crear cuenta';
    document.getElementById('password').setAttribute('autocomplete', mode === 'login' ? 'current-password' : 'new-password');
    hideAlert();
  }

  function showAlert(message, type){
    const box = document.getElementById('alert-box');
    box.textContent = message;
    box.className = 'alert show ' + type;
  }
  function hideAlert(){
    document.getElementById('alert-box').className = 'alert';
  }

  function setLoading(isLoading){
    const btn = document.getElementById('submit-btn');
    btn.disabled = isLoading;
    btn.classList.toggle('loading', isLoading);
  }

  async function handleSubmit(e){
    e.preventDefault();
    hideAlert();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const full_name = document.getElementById('full_name').value.trim();

    setLoading(true);

    try{
      if (mode === 'signup'){
        if (!full_name){
          showAlert('Contanos cómo te llamás.', 'error');
          setLoading(false);
          return;
        }
        const { data, error } = await sb.auth.signUp({
          email,
          password,
          options: { data: { full_name } }
        });
        if (error) throw error;
        showAlert('Cuenta creada. Revisá tu email para confirmar el acceso.', 'success');
      } else {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
        // Login OK -> redirigir al dashboard
        window.location.href = 'app.html';
      }
    } catch(err){
      const friendly = translateError(err.message);
      showAlert(friendly, 'error');
    } finally {
      setLoading(false);
    }
  }

  function translateError(msg){
    if (!msg) return 'Ocurrió un error inesperado.';
    if (msg.includes('Invalid login credentials')) return 'Email o contraseña incorrectos.';
    if (msg.includes('User already registered')) return 'Ya existe una cuenta con ese email.';
    if (msg.includes('Password should be at least')) return 'La contraseña debe tener al menos 6 caracteres.';
    if (msg.includes('Email not confirmed')) return 'Confirmá tu email antes de ingresar.';
    return msg;
  }

  // Si ya hay sesión activa, redirigir directo al dashboard
  (async () => {
    const { data } = await sb.auth.getSession();
    if (data?.session){
      window.location.href = 'app.html';
    }
  })();
</script>

</body>
</html>
